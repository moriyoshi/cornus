{{- if and (or (eq .Values.registry.exposure "nodePort") (eq .Values.registry.exposure "clusterIP")) .Values.registry.nodeCIDR }}
# Registry pull allow. For nodePort/clusterIP exposure the image pull terminates at
# this pod, so under a default-deny posture it must explicitly permit node-origin
# traffic. The source is a node IP (the pull runs in the node's host netns, not a
# pod), so it is expressed as an ipBlock over the node CIDR — no podSelector can
# match it. NetworkPolicies are additive, so this only opens the registry port.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cornus.fullname" . }}-registry-pull
  labels:
    {{- include "cornus.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cornus.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: {{ .Values.registry.nodeCIDR | quote }}
      ports:
        - protocol: TCP
          port: 5000
{{- end }}
