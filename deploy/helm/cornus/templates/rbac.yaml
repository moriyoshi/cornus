apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cornus.fullname" . }}
  labels:
    {{- include "cornus.labels" . | nindent 4 }}
{{- if .Values.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cornus.fullname" . }}
  labels:
    {{- include "cornus.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # One-shot / init compose services (restart: "no" or "on-failure") become
  # Jobs instead of Deployments; see pkg/deploy/kubernetes/job.go.
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Managed volumes become PersistentVolumeClaims: reconcile creates the PVC
  # backing each volume (owned by the Deployment for anonymous volumes, un-owned
  # for named ones), and `compose down --volumes` deletes named-volume PVCs.
  # Without this grant, deploying any service with a volume fails at reconcile.
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- if .Values.ingress.manageIngresses }}
  # Ingress objects (opt-in via ingress.manageIngresses): a workload with a NATIVE /
  # real x-cornus-ingress makes the deploy backend create/update an Ingress fronting
  # the workload's own Service, GC'd with the workload via its owner reference.
  # Without this grant, deploying such a service fails at reconcile with
  # `ingresses.networking.k8s.io is forbidden`. Off by default (least privilege),
  # mirroring the Secrets grant below: the common client-side EMULATED ingress
  # (`--ingress-conduit=emulate`) creates NO server object and needs this not at all.
  # This is the Ingress OBJECT only; the sensitive inline-TLS Secrets grant is
  # separate, below.
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- end }}
  # Pod subresources proxied through the cornus server: logs (compose logs) and
  # the streaming exec / attach / port-forward endpoints. A subresource is a
  # separate RBAC grant from "pods", so these are required for `cornus compose
  # logs`, `cornus exec`, and `cornus port-forward` to work server-side.
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec", "pods/attach", "pods/portforward"]
    verbs: ["get", "create"]
  # Multi-replica hub (CORNUS_HUB_STORE=kube): the Kubernetes-native hub store
  # writes provider records as HubEndpoint CRs and renews a per-replica Lease.
  - apiGroups: ["cornus.dev"]
    resources: ["hubendpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Leases serve two features: the multi-replica hub store's per-replica
  # liveness Leases (random hashed names, so no resourceNames scoping is
  # possible) and, when gc.lease is set, the single GC-coordination Lease
  # (CORNUS_GC_LEASE needs only get/create/update on it, already covered here).
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- if .Values.ingress.manageTLSSecrets }}
  # Ingress TLS (opt-in via ingress.manageTLSSecrets): a workload with an ingress
  # TLS block that carries inline (managed) certificates makes the deploy backend
  # create/update the backing kubernetes.io/tls Secrets and prune obsolete ones by
  # label selector; see applyManagedIngressTLSSecrets in
  # pkg/deploy/kubernetes/kubernetes.go. That needs get/list/create/update/delete on
  # Secrets in this namespace — without it, `cornus compose` with an ingress TLS
  # config fails at deploy time.
  #
  # The read verbs (get/list) are not an escalation: pod create + pods/exec (above)
  # already let the server read any Secret in its own namespace. The write verbs
  # (create/update/delete) ARE a new capability, but the write path only ever touches
  # Cornus-labelled Secrets and refuses to overwrite a Secret it does not own (the
  # managedIngressTLSLabel + app-label guard in kubernetes.go).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- end }}
  {{- with .Values.caretakerTlsSecret }}
  # Caretaker sidecar TLS: the deploy backend inspects the TLS Secret's keys at
  # deploy time (get only, pinned to this one Secret) to decide CA-only vs mTLS
  # wiring. Mounting the Secret into sidecar pods needs no RBAC — the kubelet
  # resolves the volume.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ . | quote }}]
    verbs: ["get"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cornus.fullname" . }}
  labels:
    {{- include "cornus.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cornus.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "cornus.fullname" . }}
---
# Cluster-scoped RBAC for the multi-replica hub store's CRD self-install. The
# HubEndpoint CustomResourceDefinition is cluster-scoped, so creating (and reading)
# it needs a ClusterRole. Only used when running the hub with
# CORNUS_HUB_STORE=kube; harmless otherwise.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cornus.fullname" . }}-hub-crd
  labels:
    {{- include "cornus.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cornus.fullname" . }}-hub-crd
  labels:
    {{- include "cornus.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cornus.fullname" . }}-hub-crd
subjects:
  - kind: ServiceAccount
    name: {{ include "cornus.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
