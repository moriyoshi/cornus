# A single RUNNING one-shot service WITH an anonymous managed volume. restart:"no"
# maps to a Kubernetes Job on the kube backend, and the command sleeps while
# ignoring SIGTERM so the Job pod stays Running (not Completed). On a re-apply the
# old Job is deleted foreground, so it lingers for the whole stop_grace_period
# before its pod is SIGKILLed and the Job clears — the window the recreate must wait
# out. See compose-redeploy-oneshot.star.
#
# The anonymous volume is deliberate: an anonymous managed volume becomes a PVC
# OWNED by the Job, so the foreground Job delete on re-apply cascades a GC of that
# PVC. The recreate's PVC ensure then races the still-terminating claim — if it
# adopts the doomed claim, the new pod wedges Unschedulable
# ("persistentvolumeclaim ... not found") once the GC completes. This makes the
# scenario exercise ensurePVC's wait-out-then-recreate path, not just waitJobGone.
name: rdoneshot
services:
  worker:
    image: alpine:3.20
    restart: "no"
    stop_grace_period: 8s
    command: ["sh", "-c", "trap '' TERM; sleep 3600"]
    volumes:
      - data:/data
volumes:
  data:
