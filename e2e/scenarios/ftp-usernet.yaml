# Two workloads on a shared user-network (a `bridge`-driver network -> real
# L2/L3 connectivity via the netdriver, not the name-only hub overlay). The FTP
# server is the Go ftpserverlib fixture (built from ./ftp); the client is a
# busybox sleeper that the harness drives with ftpput/ftpget via pod_exec.
#
# FTP is deliberately NOT run over the hub overlay: PASV/PORT embed IP:port
# addresses in-band that a name-based relay cannot rewrite (the classic
# FTP-through-proxy problem), so a real user-network is the correct fabric. The
# server advertises FTP_PASV_ADDRESS=auto so ftpserverlib fills the PASV reply
# with the on-network IP the client actually reached it at (see e2e/scenarios/
# ftp/ftpd.go), which a hardcoded/masqueraded address could not provide here.
name: ftpnet
services:
  ftpsrv:
    build:
      context: ./ftp
    environment:
      FTP_PASV_ADDRESS: "auto"
    networks: [ftpnet]
  ftpcli:
    image: busybox:1.36
    command: ["sleep", "3600"]
    networks: [ftpnet]
networks:
  ftpnet:
    driver: bridge
