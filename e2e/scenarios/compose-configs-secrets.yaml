# File-based configs + secrets fixture: a top-level config and secret sourced
# from files next to this compose file are mounted into the service at their
# default paths (/<config-name> and /run/secrets/<secret-name>). Public image,
# no build.
name: ccs
configs:
  app_cfg:
    file: ./compose-cfgsec/app.conf
secrets:
  db_pw:
    file: ./compose-cfgsec/db_pw.txt
services:
  app:
    image: alpine:3.20
    command: ["sleep", "3600"]
    configs:
      - app_cfg
    secrets:
      - db_pw
